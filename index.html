<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Apply the saved theme immediately so this landing page never flashes. -->
<script src="shared/theme.js?v=2"></script>
<script src="shared/gate.js?v=1"></script>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Remedy Toolbox</title>
<!-- Entry point for GitHub Pages (and any web host): send visitors to the hub.
     The hub page (Remedy_Home.html) stays the single source for the home screen;
     this file only forwards to it. -->
<link rel="canonical" href="Remedy_Home.html">
<meta http-equiv="refresh" content="0; url=Remedy_Home.html">
<style>
  html,body{margin:0;height:100%;}
  body{
    font-family: Calibri, "Segoe UI", Tahoma, sans-serif;
    background: var(--bg, #F4F4F4);
    color: var(--ink, #2B2B2B);
    display:flex; align-items:center; justify-content:center;
  }
  .redir{ text-align:center; padding:32px; }
  .redir img{ height:56px; margin-bottom:16px; }
  .redir .eyebrow{
    font-size:11px; font-weight:bold; letter-spacing:2px; text-transform:uppercase;
    color: var(--orange-d, #b0501a); margin-bottom:6px;
  }
  .redir h1{ margin:0 0 14px; font-size:22px; color: var(--ink, #2B2B2B); }
  .redir a{ color: var(--orange-d, #b0501a); font-weight:bold; }
</style>
  <link rel="stylesheet" href="shared/mobile.css?v=1">
</head>
<body>
  <div class="redir">
    <img src="shared/remedy-logo.png" alt="Remedy" onerror="this.style.display='none'">
    <div class="eyebrow">Remedy Toolbox</div>
    <h1>Opening the toolbox&hellip;</h1>
    <p>If you are not redirected automatically, <a href="Remedy_Home.html">click here to enter</a>.</p>
  </div>
  <script>
    // Belt-and-braces redirect (in case meta-refresh is blocked).
    location.replace('Remedy_Home.html');
  </script>
</body>
</html>
